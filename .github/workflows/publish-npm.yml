name: Publish to NPM

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"
          scope: "@arthurpsevero23"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Verify package.json version matches tag
        run: |
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PACKAGE_VERSION vs tag=v$TAG_VERSION"
            exit 1
          fi
          echo "✓ Version verified: $PACKAGE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Run tests (if configured)
        run: npm test --if-present

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            Published to NPM as `@arthurpsevero23/spec-kit@${{ steps.version.outputs.version }}`
            
            Install with:
            ```
            npm install @arthurpsevero23/spec-kit@${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false

      - name: Post publish summary
        run: |
          echo "✓ Successfully published @arthurpsevero23/spec-kit@${{ steps.version.outputs.version }} to NPM"
          echo "View on npm: https://www.npmjs.com/package/@arthurpsevero23/spec-kit"
